name: Release desktop application

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:verify-version -- "${{ github.ref_name }}"
      - run: npm run lint
      - run: npm run build

  publish:
    name: Build ${{ matrix.name }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: ''
          - name: macOS Apple Silicon
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - name: macOS Intel
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_MACOS_SIGNING_IDENTITY: ${{ secrets.TAURI_MACOS_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:verify-version -- "${{ github.ref_name }}"
      - run: npm run release:prepare
      - uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: Codex Skin Studio v__VERSION__
          releaseBody: See the assets below to download and install this version.
          releaseDraft: true
          prerelease: false
          releaseUpdaterJson: true
          args: ${{ matrix.args }} --config src-tauri/tauri.release.conf.json
